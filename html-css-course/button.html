<style>
  .subscribe-button{
    background-color: rgb(200, 0, 0);
    color:white;
    border: none;
    height: 36px;
    width: 105px;
    border-radius: 5px;
    cursor: pointer;
    margin-right: 8px;
    transition: opacity 0.15s;
  }

  .subscribe-button:hover{
    opacity: 0.7;
}

.subscribe-button:active{
    opacity: 0.5;
}
  .join-button{
    background-color: rgb(255, 255, 255);
    color:rgb(37, 155, 210);
    border: rgb(37, 155, 210);
    border-width: 1px;
    height: 27px;
    width: 60px;
    cursor: pointer;
    border-radius: 1px;
    border-style: solid;
    margin-right: 8px;
    transition: background-color 1s, color 1s;
    }

    .join-button:hover{
      background-color:rgb(37, 155, 210);
    color: rgb(255, 255, 255);
    }

    .join-button:active{
      opacity: 0.7;
    }

  .tweet-button{
   background-color: rgb(9, 144, 228);
        color: white;
        border: none;
        height: 36px;
        width: 70px;
        font-weight: bold;
        font-size: 15;
        border-radius: 18px;
        cursor: pointer;
       transition: box-shadow 0.15s;
    }

    .tweet-button:hover{
 box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);
    }
  
</style>


<button class="subscribe-button">SUBSCRIBE</button>
<button class="join-button">JOIN</button>
<button class="tweet-button">Tweet</button>
