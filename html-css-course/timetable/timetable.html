<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Time Table Assignment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .container {
            background-color:white;
            padding: 20px;
            border-radius: 6px;
        }

        .assignment {
            background-color: #e74c3c;
            color: black;
            text-align: center;
            font-weight: bold;
            padding: 8px;
            margin-bottom: 10px;
            width: fit-content;
        }

        table {
            border-collapse: collapse;
            width: 700px;
            text-align: center;
        }

        th, td {
            border: 2px solid #333;
            padding: 10px;
        }

        th {
            background-color:white;
            font-size: 18px;
        }

        .lunch {
            font-weight: bold;
            background-color:white;
        }

        .hours {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="assignment">ASSIGNMENT</div>

    <table>
        <tr>
            <th colspan="7">TIME TABLE</th>
        </tr>

        <tr>
            <td class="hours" rowspan="3">Hours</td>
            <td>Mon</td>
            <td>Tue</td>
            <td>Wedn</td>
            <td>Thu</td>
            <td>Sat</td>
            <td>Sun</td>
        </tr>

        <tr>
            <td>Math</td>
            <td>Math</td>
            <td>Math</td>
            <td>Math</td>
            <td>Math</td>
            <td>Math</td>
        </tr>

        <tr>
            <td>Science</td>
            <td>Science</td>
            <td>Science</td>
            <td>Science</td>
            <td>Science</td>
            <td>Science</td>
        </tr>

        <tr>
            <td colspan="7" class="lunch">Lunch</td>
        </tr>

        <tr>
            <td></td>
            <td>SST</td>
            <td>SST</td>
            <td>SST</td>
            <td>SST</td>
            <td>SST</td>
            <td rowspan="2">Games</td>
        </tr>

        <tr>
            <td></td>
            <td>CS</td>
            <td>CS</td>
            <td>CS</td>
            <td>CS</td>
            <td>CS</td>
        </tr>
    </table>
</div>

</body>
</html>
