<!DOCTYPE html>
<html>
<head>
    <title>Time Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin: auto;
            text-align: center;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
        }
        th {
            background-color: #d9f2f2;
        }
        .lunch {
            background-color: #f2f2f2;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">TIME TABLE</h2>

<table>
    <tr>
        <th>Day</th>
        <th>Period 1</th>
        <th>Period 2</th>
        <th>Period 3</th>
        <th>Lunch</th>
        <th>Period 4</th>
        <th>Period 5</th>
    </tr>

    <tr>
        <td>Monday</td>
        <td>Math</td>
        <td>Science</td>
        <td>Math</td>
        <td class="lunch">Lunch</td>
        <td>SST</td>
        <td>CS</td>
    </tr>

    <tr>
        <td>Tuesday</td>
        <td>Science</td>
        <td>Math</td>
        <td>Science</td>
        <td class="lunch">Lunch</td>
        <td>SST</td>
        <td>CS</td>
    </tr>

    <tr>
        <td>Wednesday</td>
        <td>Math</td>
        <td>Science</td>
        <td>Math</td>
        <td class="lunch">Lunch</td>
        <td>SST</td>
        <td>CS</td>
    </tr>

    <tr>
        <td>Thursday</td>
        <td>Science</td>
        <td>Math</td>
        <td>Science</td>
        <td class="lunch">Lunch</td>
        <td>SST</td>
        <td>CS</td>
    </tr>

    <tr>
        <td>Friday</td>
        <td>Math</td>
        <td>Science</td>
        <td>Math</td>
        <td class="lunch">Lunch</td>
        <td>SST</td>
        <td>Games</td>
    </tr>
</table>

</body>
</html>
